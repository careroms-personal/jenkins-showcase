jenkins:
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  clouds:
  - kubernetes:
      containerCap: 10
      containerCapStr: "10"
      jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
      jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
      name: "kubernetes"
      namespace: "jenkins"
      podLabels:
      - key: "jenkins/jenkins-jenkins-agent"
        value: "true"
      serverUrl: "https://kubernetes.default"
      templates:
      - containers:
        - args: "^${computer.jnlpmac} ^${computer.name}"
          envVars:
          - envVar:
              key: "JENKINS_URL"
              value: "http://jenkins.jenkins.svc.cluster.local:8080/"
          image: "jenkins/inbound-agent:3383.vc8881d4b_0e76-1"
          name: "jnlp"
          resourceLimitCpu: "512m"
          resourceLimitMemory: "512Mi"
          resourceRequestCpu: "512m"
          resourceRequestMemory: "512Mi"
          workingDir: "/home/jenkins/agent"
        id: "089cb1132d51658bfd2a4db738e2a9367e34401d60b76bf16db60f734a6f56f2"
        label: "jenkins-jenkins-agent"
        name: "default"
        namespace: "jenkins"
        nodeUsageMode: NORMAL
        podRetention: "never"
        serviceAccount: "default"
        slaveConnectTimeout: 100
        slaveConnectTimeoutStr: "100"
        yamlMergeStrategy: "override"
      - containers:
        - args: "999999"
          command: "sleep"
          image: "gcr.io/kaniko-project/executor:debug"
          name: "kaniko"
          privileged: true
        id: "d90ba930-4652-431f-8329-2d8fe42574a8"
        label: "image-builder"
        name: "image-builder"
        volumes:
        - emptyDirVolume:
            memory: false
            mountPath: "/workspace"
        - secretVolume:
            mountPath: "/kaniko/.docker"
            secretName: "personal-dockerhub"
      - containers:
        - args: "999999"
          command: "sleep"
          image: "alpine/helm:latest"
          livenessProbe:
            failureThreshold: 0
            initialDelaySeconds: 0
            periodSeconds: 0
            successThreshold: 0
            timeoutSeconds: 0
          name: "helm"
          workingDir: "/home/jenkins/agent"
        id: "1d569d46-62a6-4cf5-8ce1-77c51938aea8"
        label: "helm-deploy"
        name: "helm-deploy"
        serviceAccount: "jenkins-deployer"
        volumes:
        - emptyDirVolume:
            memory: false
            mountPath: "/tmp"
        yamlMergeStrategy: "override"
      - containers:
        - args: "999999"
          command: "sleep"
          image: "ubuntu:latest"
          name: "ubuntu"
        id: "1e77a306-3958-486c-90bd-c5bf1450d861"
        label: "general-job"
        name: "general-job"
      - containers:
        - args: "9999999"
          command: "sleep"
          image: "ubuntu:latest"
          livenessProbe:
            failureThreshold: 0
            initialDelaySeconds: 0
            periodSeconds: 0
            successThreshold: 0
            timeoutSeconds: 0
          name: "ubuntu"
          workingDir: "/home/jenkins/agent"
        - args: "9999999"
          command: "sleep"
          image: "gcr.io/kaniko-project/executor:debug"
          livenessProbe:
            failureThreshold: 0
            initialDelaySeconds: 0
            periodSeconds: 0
            successThreshold: 0
            timeoutSeconds: 0
          name: "kaniko"
          privileged: true
          workingDir: "/home/jenkins/agent"
        - args: "9999999"
          command: "sleep"
          image: "alpine/helm:latest"
          livenessProbe:
            failureThreshold: 0
            initialDelaySeconds: 0
            periodSeconds: 0
            successThreshold: 0
            timeoutSeconds: 0
          name: "helm"
          workingDir: "/home/jenkins/agent"
        id: "dbeb7774-e3ff-44be-b6d2-1ac70cc3f1ff"
        label: "general-pipeline"
        name: "general-pipeline"
        namespace: "jenkins"
        serviceAccount: "jenkins-deployer"
        volumes:
        - emptyDirVolume:
            memory: false
            mountPath: "/workspace"
        - secretVolume:
            mountPath: "/kaniko/.docker"
            optional: false
            secretName: "personal-dockerhub"
        yamlMergeStrategy: "override"
      - containers:
        - args: "9999999"
          command: "sleep"
          image: "gcc:13-bookworm"
          livenessProbe:
            failureThreshold: 0
            initialDelaySeconds: 0
            periodSeconds: 0
            successThreshold: 0
            timeoutSeconds: 0
          name: "gcc-13"
          workingDir: "/home/jenkins/agent"
        id: "f1072b68-2f74-4a24-be6f-69d84b3fce6b"
        label: "cpp-run-test"
        name: "cpp-run-test"
        namespace: "jenkins"
        yamlMergeStrategy: "override"
  crumbIssuer: "standard"
  disableRememberMe: false
  disabledAdministrativeMonitors:
  - "hudson.diagnosis.ReverseProxySetupMonitor"
  labelAtoms:
  - name: "built-in"
  - name: "cpp-run-test"
  - name: "general-job"
  - name: "general-pipeline"
  - name: "helm-deploy"
  - name: "image-builder"
  - name: "jenkins-jenkins-agent"
  log: {
    }
  markupFormatter: "plainText"
  mode: NORMAL
  nodeMonitors:
  - "architecture"
  - "clock"
  - diskSpace:
      freeSpaceThreshold: "1GiB"
      freeSpaceWarningThreshold: "2GiB"
  - "swapSpace"
  - tmpSpace:
      freeSpaceThreshold: "1GiB"
      freeSpaceWarningThreshold: "2GiB"
  - "responseTime"
  numExecutors: 0
  primaryView:
    all:
      name: "all"
  projectNamingStrategy: "standard"
  quietPeriod: 5
  remotingSecurity:
    enabled: true
  scmCheckoutRetryCount: 0
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
      - id: "jenkins"
        name: "jenkins"
        properties:
        - "apiToken"
        - "consoleUrlProvider"
        - "viewsTabBar"
        - myView:
            viewsTabBar: "standard"
        - preferredProvider:
            providerId: "default"
        - "timezone"
        - "experimentalFlags"
        - mailer:
            emailAddress: "jenkins@jenkins.com"
        - "favorite"
  slaveAgentPort: 50000
  systemMessage: "test from diagnose script"
  updateCenter:
    sites:
    - id: "default"
      url: "https://updates.jenkins.io/update-center.json"
  views:
  - all:
      name: "all"
  viewsTabBar: "standard"
