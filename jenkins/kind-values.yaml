extraObjects:
  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: jenkins-home-pv
    spec:
      capacity:
        storage: 50Gi
      accessModes:
        - ReadWriteOnce
      persistentVolumeReclaimPolicy: Retain
      storageClassName: manual
      hostPath:
        path: /data/jenkins-home

persistence:
  storageClass: manual

controller:
  additionalPlugins:
    - blueocean

  JCasC:
    # jenkins/jcasc/jenkins-k8s.yaml (injected via the jenkins Application's
    # fileParameters) is the single source of truth for JCasC now, so the
    # chart's own auto-generated config is disabled to avoid both declaring
    # jenkins.securityRealm / authorizationStrategy / etc.
    defaultConfig: false
