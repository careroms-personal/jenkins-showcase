jenkins:
  clouds:
    - kubernetes:
        name: "k8s-custom"
        # Jenkins is already running inside this cluster (namespace "jenkins",
        # service account "jenkins"), so serverUrl/credentialsId are left blank
        # and the plugin auto-detects in-cluster config + token from the pod's SA.
        namespace: "jenkins"
        jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
        jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
        skipTlsVerify: false
        containerCapStr: "10"
        maxRequestsPerHostStr: "32"
        retentionTimeout: 5
        connectTimeout: 5
        readTimeout: 15
        waitForPodSec: 600
        templates:
          - name: "image-builder"
            label: "image-builder"
            containers:
              - name: "kaniko"
                image: "gcr.io/kaniko-project/executor:debug"
                command: "sleep"
                args: "999999"
                privileged: true
            volumes:
              - emptyDirVolume:
                  mountPath: "/workspace"
                  memory: false
              - secretVolume:
                  mountPath: "/kaniko/.docker"
                  secretName: "personal-dockerhub"
          - name: "helm-deploy"
            label: "helm-deploy"
            serviceAccount: "jenkins-deployer"
            containers:
              - name: "helm"
                image: "alpine/helm:latest"
                command: "sleep"
                args: "999999"
                privileged: false
            volumes:
              - emptyDirVolume:
                  mountPath: "/tmp"
                  memory: false
