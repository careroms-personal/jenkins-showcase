apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: datastore-app-secrets
  namespace: datastore
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
  dataFrom:
    - extract:
        key: datastore/postgres-credentials