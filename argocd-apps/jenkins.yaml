apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:careroms-personal/jenkins-showcase.git
    targetRevision: main
    path: jenkins
    helm:
      valueFiles:
        - kind-values.yaml
      fileParameters:
        # Keeps jenkins/jcasc/jenkins-k8s.yaml as the single source of truth
        # for JCasC instead of duplicating its content into kind-values.yaml.
        - name: controller.JCasC.configScripts.main
          path: jcasc/jenkins-k8s.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
