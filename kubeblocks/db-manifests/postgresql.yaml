apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: example-postgresql-cluster
  namespace: datastore
spec:
  clusterDef: postgresql
  topology: replication      # Patroni-based replication: 1 primary + N replicas
  terminationPolicy: Delete
  componentSpecs:
    - name: postgresql
      serviceVersion: 17.5.0
      replicas: 3            # 1 primary + 2 replicas
      # Requires the "postgres-credentials" secret (key: password) to already exist in this
      # namespace before the cluster is created -- pending Vault/ESO sync. secretRef is
      # immutable once set, so this only takes effect on cluster creation, not on an update.
      systemAccounts:
        - name: postgres
          secretRef:
            name: postgres-credentials
            namespace: datastore
            password: password
      resources:
        limits:
          cpu: '1'
          memory: 1Gi
        requests:
          cpu: '0.5'
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
